name: Render Mockups

on:
  workflow_dispatch:
    inputs:
      brand:
        description: Brand name
        required: true
        default: lucchese

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch render.js
        run: |
          sed -i 's/const CSQ=/const CSS=/g' .github/scripts/render.js
          sed -i 's|shoptuckernuck/picture|shoptuckernuck/LOGO_REPLACED|g' .github/scripts/render.js
          sed -i 's|https://graph.facebook.com/shoptuckernuck/LOGO_REPLACED?type=large|data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 140 40%22%3E%3Crect width=%22140%22 height=%2240%22 fill=%22%23000%22/%3E%3Ctext x=%2270%22 y=%2220%22 font-family=%22Georgia,serif%22 font-size=%2210%22 font-weight=%22700%22 letter-spacing=%223%22 fill=%22white%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3ETUCKERNUCK%3C/text%3E%3C/svg%3E|g' .github/scripts/render.js
          sed -i 's|collections/10643_MEDIUM_IMAGE_01_1845229_1907945902.webp|articles/715_ONE_SIZE_IMAGE_01_1711211_317477317.webp|g' .github/scripts/render.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: |
          cd .github/scripts
          npm init -y --silent
          npm i playwright --silent
          npx playwright install --with-deps chromium
      - name: Generate mockup
        run: cd .github/scripts && node render.js ${{ inputs.brand }}
      - name: Copy output
        run: mv .github/scripts/mockup-output ./mockup-output
      - name: Upload mockup
        uses: actions/upload-artifact@v4
        with:
          name: push-mockup-${{ inputs.brand }}
          path: mockup-output/*
          retention-days: 7
