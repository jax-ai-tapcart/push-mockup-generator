name: Render Mockups

on:
  workflow_dispatch:
    inputs:
      brand:
        description: Brand name
        required: true
        default: lucchese

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch render.js
        run: |
          sed -i 's/const CSQ=/const CSS=/g' .github/scripts/render.js
          sed -i 's|10643_MEDIUM_IMAGE_01_1845229_1907945902.webp?v=1747944902|10927_MEDIUM_IMAGE_01_1898164_-1963968445.webp?v=1664384022|g' .github/scripts/render.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: |
          cd .github/scripts
          npm init -y --silent
          npm i playwright --silent
          npx playwright install --with-deps chromium
      - name: Generate mockup
        run: cd .github/scripts && node render.js ${{ inputs.brand }}
      - name: Copy output
        run: mv .github/scripts/mockup-output ./mockup-output
      - name: Upload mockup
        uses: actions/upload-artifact@v4
        with:
          name: push-mockup-${{ inputs.brand }}
          path: mockup-output/*
          retention-days: 7
