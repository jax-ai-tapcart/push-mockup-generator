name: Render Mockups

on:
  workflow_dispatch:
    inputs:
      brand:
        description: Brand name
        required: true
        default: lucchese

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch render.js
        run: |
          sed -i 's/const CSQ=/const CSS=/g' .github/scripts/render.js
          # tnuck: cream bg, bougainvillea hero, shorter title
          sed -i 's|bg:"#865E18"|bg:"#f2ede6"|g' .github/scripts/render.js
          sed -i 's|collections/10643_MEDIUM_IMAGE_01_1845229_1907945902.webp|articles/715_ONE_SIZE_IMAGE_01_1711211_317477317.webp|g' .github/scripts/render.js
          sed -i 's|title:"Dressed for wherever life takes you."|title:"Wherever life takes you."|g' .github/scripts/render.js
          # Fix card proportions
          sed -i 's/width:375px/width:270px/g' .github/scripts/render.js
          sed -i 's/border-radius:14px/border-radius:20px/g' .github/scripts/render.js
          sed -i 's/height:260px/height:268px/g' .github/scripts/render.js
          sed -i 's/padding:8px 10px/padding:12px 12px/g' .github/scripts/render.js
          sed -i 's/font-size:15px;font-weight:600/font-size:12px;font-weight:600/g' .github/scripts/render.js
          sed -i 's/font-size:15px;font-weight:400/font-size:12px;font-weight:400/g' .github/scripts/render.js
          sed -i 's/border:1px solid #d1d1d6;//g' .github/scripts/render.js
          sed -i 's/width:750,height:710/width:550,height:700/g' .github/scripts/render.js
          # Enforce 1-line title (no ellipsis - copy is short enough)
          sed -i 's/font-weight:600;color:#000;/font-weight:600;color:#000;white-space:nowrap;overflow:hidden;/g' .github/scripts/render.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: |
          cd .github/scripts
          npm init -y --silent
          npm i playwright --silent
          npx playwright install --with-deps chromium
      - name: Generate mockup
        run: cd .github/scripts && node render.js ${{ inputs.brand }}
      - name: Copy output
        run: mv .github/scripts/mockup-output ./mockup-output
      - name: Upload mockup
        uses: actions/upload-artifact@v4
        with:
          name: push-mockup-${{ inputs.brand }}
          path: mockup-output/*
          retention-days: 7
